owner: dpkg-i-foo-deb # Your GitHub organization or username, where this repository lives
repo: upptime # The name of this repository

sites:
  - name: Navidrome
    url: https://music.baremetalcloud.org
  - name: Vaultwarden
    url: https://vault.baremetalcloud.org
  - name: Keycloak
    url: https://auth.baremetalcloud.org
  - name: Immich
    url: https://photos.baremetalcloud.org
  - name: Termix
    url: https://termix.baremetalcloud.org
  - name: Headscale
    url: https://vpn.baremetalcloud.org/health
  - name: Trilium Notes
    url: https://notes.baremetalcloud.org
  - name: Zot Registry
    url: https://registry.baremetalcloud.org
  - name: Woodpecker CI
    url: https://woodpecker.baremetalcloud.org
  - name: Apache Guacamole
